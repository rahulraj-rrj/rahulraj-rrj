<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 300" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <radialGradient id="aurora-indigo" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#0b0f19" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="aurora-cyan" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#0b0f19" stop-opacity="0" />
    </radialGradient>
    
    <!-- Text Gradients -->
    <linearGradient id="grad-name" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="60%" stop-color="#e0e7ff" />
      <stop offset="100%" stop-color="#a5b4fc" />
    </linearGradient>
    <linearGradient id="grad-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.7" stroke-opacity="0.6" />
    </pattern>

    <!-- Embedded CSS Styling and Keyframe Animations -->
    <style>
      .bg { fill: #0b0f19; }
      .text-welcome {
        font-family: 'Space Grotesk', 'Courier New', monospace;
        font-size: 14px;
        fill: #6366f1;
        font-weight: 600;
        letter-spacing: 0.15em;
        text-transform: uppercase;
      }
      .text-name {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 46px;
        font-weight: 800;
        fill: url(#grad-name);
        letter-spacing: -0.02em;
      }
      .text-tagline {
        font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
        font-size: 18px;
        font-weight: 500;
        fill: #9ca3af;
      }
      .terminal-symbol {
        font-family: 'Courier New', monospace;
        font-size: 18px;
        fill: #06b6d4;
        font-weight: bold;
      }
      .cursor {
        fill: #06b6d4;
        animation: blink 1s step-end infinite;
      }
      
      /* Glowing lines and nodes on the right */
      .network-node {
        fill: #06b6d4;
        animation: pulse-node 4s ease-in-out infinite alternate;
      }
      .network-node-indigo {
        fill: #6366f1;
        animation: pulse-node 5s ease-in-out infinite alternate;
      }
      .network-line {
        stroke: #1e293b;
        stroke-width: 1.5;
        stroke-dasharray: 8 4;
        animation: dash 30s linear infinite;
      }
      .network-line-active {
        stroke: url(#grad-accent);
        stroke-width: 1.5;
        stroke-opacity: 0.4;
      }
      
      /* Animations */
      @keyframes blink {
        from, to { opacity: 1; }
        50% { opacity: 0; }
      }
      
      @keyframes pulse-node {
        0% { r: 4px; opacity: 0.5; filter: drop-shadow(0 0 2px rgba(6,182,212,0.3)); }
        100% { r: 6px; opacity: 1; filter: drop-shadow(0 0 8px rgba(6,182,212,0.8)); }
      }

      @keyframes dash {
        to { stroke-dashoffset: -1000; }
      }

      /* Multi-tagline animation cycle */
      .tagline-group {
        animation: tagline-cycle 12s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }

      @keyframes tagline-cycle {
        0%, 25% { transform: translateY(0px); opacity: 1; }
        28%, 33% { opacity: 0; }
        34%, 59% { transform: translateY(-30px); opacity: 1; }
        62%, 67% { opacity: 0; }
        68%, 93% { transform: translateY(-60px); opacity: 1; }
        96%, 100% { opacity: 0; }
      }
      
      /* Subtle background auroras motion */
      .aurora-bg-indigo {
        animation: drift-indigo 10s ease-in-out infinite alternate;
      }
      .aurora-bg-cyan {
        animation: drift-cyan 12s ease-in-out infinite alternate;
      }
      @keyframes drift-indigo {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(30px, -20px) scale(1.1); }
      }
      @keyframes drift-cyan {
        0% { transform: translate(0, 0) scale(1); }
        100% { transform: translate(-40px, 30px) scale(1.15); }
      }
    </style>
  </defs>

  <!-- Base Background -->
  <rect width="100%" height="100%" class="bg" />

  <!-- Auroras -->
  <circle cx="150" cy="80" r="300" fill="url(#aurora-indigo)" class="aurora-bg-indigo" />
  <circle cx="650" cy="220" r="250" fill="url(#aurora-cyan)" class="aurora-bg-cyan" />

  <!-- Grid overlay -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- RIGHT SIDE: Abstract Code/Network Graphics -->
  <g id="network-graphic" transform="translate(100, 0)">
    <!-- Connection Lines -->
    <line x1="450" y1="80" x2="560" y2="50" class="network-line" />
    <line x1="560" y1="50" x2="680" y2="90" class="network-line" />
    <line x1="560" y1="50" x2="600" y2="160" class="network-line-active" />
    <line x1="600" y1="160" x2="520" y2="230" class="network-line" />
    <line x1="600" y1="160" x2="710" y2="180" class="network-line-active" />
    <line x1="680" y1="90" x2="710" y2="180" class="network-line" />
    <line x1="520" y1="230" x2="630" y2="250" class="network-line" />
    <line x1="710" y1="180" x2="630" y2="250" class="network-line-active" />
    
    <!-- Nodes -->
    <circle cx="450" cy="80" r="4" class="network-node" />
    <circle cx="560" cy="50" r="5" class="network-node-indigo" />
    <circle cx="680" cy="90" r="3" class="network-node" />
    <circle cx="600" cy="160" r="6" class="network-node" />
    <circle cx="520" cy="230" r="4" class="network-node-indigo" />
    <circle cx="710" cy="180" r="5" class="network-node" />
    <circle cx="630" cy="250" r="4" class="network-node-indigo" />
    
    <!-- Code Snippet Decorators on nodes -->
    <text x="615" y="155" fill="#06b6d4" font-family="monospace" font-size="10" opacity="0.6">&lt;API&gt;</text>
    <text x="500" y="248" fill="#6366f1" font-family="monospace" font-size="10" opacity="0.6">MVC</text>
    <text x="568" y="45" fill="#a5b4fc" font-family="monospace" font-size="10" opacity="0.5">Java</text>
  </g>

  <!-- LEFT SIDE: Branding / Introduction -->
  <g transform="translate(60, 0)">
    <!-- Hello World -->
    <text x="0" y="90" class="text-welcome">System.out.println("Hello World!");</text>
    
    <!-- Name -->
    <text x="0" y="145" class="text-name">Rahul Raj</text>

    <!-- Animated Tagline Terminal Wrapper -->
    <g transform="translate(0, 185)">
      <!-- Terminal Indicator -->
      <text x="0" y="0" class="terminal-symbol">&gt;</text>
      
      <!-- Clipped sliding tagline group -->
      <g transform="translate(20, -5)">
        <g class="tagline-group">
          <!-- Text 1 -->
          <text x="0" y="5" class="text-tagline">Spring Boot &amp; Java Specialist</text>
          <!-- Text 2 -->
          <text x="0" y="35" class="text-tagline">Full-Stack Developer (MERN)</text>
          <!-- Text 3 -->
          <text x="0" y="65" class="text-tagline">Backend Systems Architect</text>
        </g>
      </g>

      <!-- Blinking Cursor -->
      <rect x="290" y="-14" width="8" height="16" class="cursor" />
    </g>
    
    <!-- Subtitle/Info Badge -->
    <rect x="0" y="222" width="220" height="26" rx="13" fill="#1e293b" fill-opacity="0.6" stroke="#334155" stroke-width="1" />
    <circle cx="12" cy="235" r="4" fill="#10b981" />
    <text x="26" y="239" fill="#9ca3af" font-family="'Space Grotesk', system-ui, sans-serif" font-size="11" font-weight="600">OPEN FOR OPPORTUNITIES</text>
  </g>
</svg>
