<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 280" width="100%" height="100%">
  <defs>
    <!-- Background Gradients -->
    <radialGradient id="aurora-indigo" cx="20%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#0b0f19" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="aurora-cyan" cx="80%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0b0f19" stop-opacity="0" />
    </radialGradient>
    
    <!-- Box & Border Gradients -->
    <linearGradient id="grad-controller" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="grad-service" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="grad-database" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.05" />
    </linearGradient>
    
    <linearGradient id="border-controller" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="border-service" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="border-database" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.1" />
    </linearGradient>
    
    <!-- Text Gradients -->
    <linearGradient id="grad-name" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#cbd5e1" />
    </linearGradient>
    <linearGradient id="grad-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    
    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.8" stroke-opacity="0.4" />
    </pattern>

    <!-- Glowing Filters -->
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glow-indigo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <style>
      .bg { fill: #0d1117; }
      .text-welcome {
        font-family: 'Courier New', monospace;
        font-size: 13px;
        fill: #6366f1;
        font-weight: bold;
        letter-spacing: 0.1em;
      }
      .text-name {
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        font-size: 44px;
        font-weight: 800;
        fill: url(#grad-name);
        letter-spacing: -0.02em;
      }
      .text-tagline {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 18px;
        font-weight: 500;
        fill: #38bdf8;
      }
      .text-subtagline {
        font-family: 'Space Grotesk', system-ui, sans-serif;
        font-size: 14px;
        font-weight: 400;
        fill: #94a3b8;
      }
      
      /* Diagram Styles */
      .diag-text {
        font-family: 'Courier New', monospace;
        font-size: 11px;
        fill: #e2e8f0;
        text-anchor: middle;
        font-weight: bold;
      }
      .diag-subtext {
        font-family: sans-serif;
        font-size: 8px;
        fill: #64748b;
        text-anchor: middle;
      }
      .conn-line {
        stroke: #334155;
        stroke-width: 1.5;
        fill: none;
      }
      .conn-line-active {
        stroke: url(#grad-accent);
        stroke-width: 1.5;
        stroke-dasharray: 6 4;
        animation: flow 20s linear infinite;
      }
      .diag-arrow {
        fill: #6366f1;
      }
      
      @keyframes flow {
        to { stroke-dashoffset: -1000; }
      }
      
      .pulse-node {
        animation: blink 2s ease-in-out infinite alternate;
      }
      @keyframes blink {
        0% { opacity: 0.4; }
        100% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Background Base -->
  <rect width="100%" height="100%" class="bg" />

  <!-- Glowing Auroras -->
  <circle cx="100" cy="50" r="250" fill="url(#aurora-indigo)" />
  <circle cx="700" cy="200" r="220" fill="url(#aurora-cyan)" />

  <!-- Grid Overlay -->
  <rect width="100%" height="100%" fill="url(#grid)" />

  <!-- LEFT SIDE: Professional Branding -->
  <g transform="translate(50, 0)">
    <!-- Code line Welcome -->
    <text x="0" y="65" class="text-welcome">public class Developer {</text>
    
    <!-- Large Name -->
    <text x="0" y="115" class="text-name">Rahul Raj</text>

    <!-- Professional Static Taglines (100% Reliable Rendering) -->
    <text x="0" y="155" class="text-tagline">Spring Boot &amp; Java Developer</text>
    <text x="0" y="180" class="text-subtagline">Building layered, maintainable, and scalable backends</text>

    <text x="0" y="210" class="text-welcome" fill="#475569">}</text>

    <!-- Available for Work Status Badge -->
    <g transform="translate(0, 230)">
      <rect width="165" height="24" rx="12" fill="#10b981" fill-opacity="0.08" stroke="#10b981" stroke-width="1.2" stroke-opacity="0.8" />
      <circle cx="15" cy="12" r="3.5" fill="#10b981" class="pulse-node" />
      <text x="26" y="16" fill="#10b981" font-family="'Courier New', monospace" font-size="10" font-weight="bold">ACTIVE &amp; OPEN TO WORK</text>
    </g>
  </g>

  <!-- RIGHT SIDE: Architecture Pipeline (Controller -> Service -> Repo -> DB) -->
  <g transform="translate(480, 0)">
    <!-- Connection Paths -->
    <path d="M 60,65 L 120,135" class="conn-line" />
    <path d="M 60,65 L 120,135" class="conn-line-active" />
    
    <path d="M 120,135 L 180,205" class="conn-line" />
    <path d="M 120,135 L 180,205" class="conn-line-active" />
    
    <path d="M 180,205 L 250,205" class="conn-line" />
    
    <!-- Step 1: Controller Card -->
    <g transform="translate(10, 40)">
      <rect width="100" height="42" rx="6" fill="url(#grad-controller)" stroke="url(#border-controller)" stroke-width="1.2" />
      <text x="50" y="21" class="diag-text">Controller</text>
      <text x="50" y="32" class="diag-subtext">REST Endpoints</text>
      <circle cx="100" cy="21" r="3" fill="#3b82f6" />
    </g>

    <!-- Step 2: Service Card -->
    <g transform="translate(70, 110)">
      <rect width="100" height="42" rx="6" fill="url(#grad-service)" stroke="url(#border-service)" stroke-width="1.2" />
      <text x="50" y="21" class="diag-text">Service</text>
      <text x="50" y="32" class="diag-subtext">Business Logic</text>
      <circle cx="0" cy="21" r="3" fill="#6366f1" />
      <circle cx="100" cy="21" r="3" fill="#6366f1" />
    </g>

    <!-- Step 3: Repository Card -->
    <g transform="translate(130, 180)">
      <rect width="100" height="42" rx="6" fill="url(#grad-database)" stroke="url(#border-database)" stroke-width="1.2" />
      <text x="50" y="21" class="diag-text">Repository</text>
      <text x="50" y="32" class="diag-subtext">JPA / Hibernate</text>
      <circle cx="0" cy="21" r="3" fill="#06b6d4" />
      <circle cx="100" cy="21" r="3" fill="#06b6d4" />
    </g>

    <!-- Step 4: MySQL Database Cylinders (Abstract) -->
    <g transform="translate(250, 178)">
      <path d="M 0,10 A 15,6 0 0,0 30,10 A 15,6 0 0,0 0,10 M 0,10 L 0,34 A 15,6 0 0,0 30,34 L 30,10" fill="#0f172a" fill-opacity="0.8" stroke="#475569" stroke-width="1.2" />
      <path d="M 0,18 A 15,6 0 0,0 30,18" fill="none" stroke="#475569" stroke-width="1.2" />
      <path d="M 0,26 A 15,6 0 0,0 30,26" fill="none" stroke="#475569" stroke-width="1.2" />
      <text x="15" y="44" class="diag-subtext">MySQL</text>
    </g>

    <!-- Connector Flow Labels -->
    <text x="65" y="100" fill="#64748b" font-family="monospace" font-size="8" transform="rotate(45, 65, 100)">DTO</text>
    <text x="130" y="170" fill="#64748b" font-family="monospace" font-size="8" transform="rotate(45, 130, 170)">Entity</text>
  </g>
</svg>
