# GitHub Metrics & Snake Workflow
# Powered by lowlighter/metrics & platane/snk

name: Generate GitHub Assets

on:
  # Schedule daily updates at midnight UTC (05:30 AM IST)
  schedule:
    - cron: "0 0 * * *"
  # Allow manual triggering from the Actions tab
  workflow_dispatch:
  # Run on push to main/master
  push:
    branches:
      - main
      - master

jobs:
  # Job 1: Generate the animated contribution snake game
  generate-snake:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # Generates the snake SVGs based on your contribution board
      - name: Generate Snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: rahulraj-rrj
          outputs: |
            github-snake.svg
            github-snake-dark.svg?palette=github-dark

      # Commits the generated snake SVGs back to the main branch
      - name: Commit and Push Snake
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add github-snake.svg github-snake-dark.svg
          git commit -m "Update contribution snake animation" || echo "No changes"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2: Generate the profile infographic metrics (runs after snake finishes)
  github-metrics:
    needs: generate-snake
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Profile Metrics
        uses: lowlighter/metrics@latest
        with:
          # Your GitHub Personal Access Token (stored in Repository Secrets)
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: rahulraj-rrj
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          
          # Output file name and path
          filename: github-metrics.svg
          
          # Debug mode for troubleshooting
          debug: yes

          # Languages Plugin
          plugin_languages: yes
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_details: percentage

          # Achievements Plugin (Disabled to avoid GraphQL errors)
          plugin_achievements: no

          # Isometric Commit Calendar (3D Grid)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Coding Habits (Disabled to avoid private repo API errors)
          plugin_habits: no

          # Notable Contributions (Disabled since no matching filters were found)
          plugin_notable: no

          # People Plugin (Display followers/following avatars)
          plugin_people: yes
          plugin_people_types: followers, following
          plugin_people_limit: 24
          plugin_people_size: 28

          # Starred Topics Plugin (Display topics/interests)
          plugin_topics: yes
          plugin_topics_limit: 12
          plugin_topics_mode: icons

          # Lines of code Plugin
          plugin_lines: yes

          # Follow-up Plugin (PRs/Issues state)
          plugin_followup: yes
          plugin_followup_sections: user
