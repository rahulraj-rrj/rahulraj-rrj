name: Generate Snake Contribution Animation

on:
  schedule:
    # Runs once a day at 03:00 UTC
    - cron: '0 3 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate snake animation (pink/purple theme)
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: rahulraj-rrj
          outputs: |
            dist/github-snake.svg?color_snake=#ff5fc7&color_dots=#2a1245,#5a2a7a,#9b4dff,#ff5fc7,#ffd6f7
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#c24bff

      - name: Push snake animation to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
